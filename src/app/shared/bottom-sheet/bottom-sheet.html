<div class="bottom-sheet__backdrop"
     (click)="onClose()">
</div>

<div class="bottom-sheet__panel"
     [class.bottom-sheet__panel--dragging]="isDragging()"
     [style.--drag-offset.px]="dragOffset()">
  <div class="bottom-sheet__grip"
       (touchstart)="onDragStart($event)"
       (touchmove)="onDragMove($event)"
       (touchend)="onDragEnd()"
       (touchcancel)="onDragEnd()">
    <span class="bottom-sheet__handle"></span>
  </div>

  <div class="bottom-sheet__header">
    @if (title()) {
      <h3 class="text-headline-sm bottom-sheet__title">{{ title() }}</h3>
    }

    <button class="bottom-sheet__close-btn"
            (click)="onClose()"
            aria-label="Close menu">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="bottom-sheet__content">
    <ng-content></ng-content>
  </div>
</div>
